<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saigon Guacamole - Fresh & Handmade</title>
    <meta name="description" content="Fresh, handmade guacamole delivered in Saigon. Order now for authentic taste.">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #184118;
            color: #F5F0E8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.4;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .brand {
            margin-bottom: 32px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            object-fit: contain;
        }
        
        .brand-name {
            font-size: clamp(28px, 7vw, 42px);
            font-weight: 900;
            color: #F5F0E8;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }
        
        .tagline {
            font-size: clamp(12px, 3.5vw, 16px);
            font-weight: 600;
            color: #2e832d;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .description strong {
            color: #F5F0E8;
            font-weight: 700;
            display: block;
            margin-top: 8px;
            font-size: clamp(18px, 5vw, 22px);
        }
        
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 48px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 20px 24px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            border-radius: 16px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-primary {
            background: #6DBF45;
            color: #184118;
            box-shadow: 0 4px 15px rgba(109, 191, 69, 0.3);
        }
        
        .btn-primary:hover {
            background: #5FAF38;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(109, 191, 69, 0.4);
        }
        
        .btn-secondary {
            background: #D4A017;
            color: #1B4D1E;
            box-shadow: 0 4px 15px rgba(212, 160, 23, 0.3);
        }
        
        .btn-secondary:hover {
            background: #C49215;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 160, 23, 0.4);
        }
        
        .btn-tertiary {
            background: #3b5998;
            color: #F5F0E8;
            border: 2px solid #3b5998;
        }
        
        .btn-tertiary:hover {
            background: #3b5998;
            color: #F5F0E8;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(56, 88, 156, 0.3);
        }
        
        .btn-instagram {
            background: linear-gradient(45deg, #5851db, #833ab4, #c13584, #e1306c);
            color: #F5F0E8;
            border: none;
        }
        
        .btn-instagram:hover {
            background: linear-gradient(45deg, #5851db, #833ab4, #c13584, #e1306c);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(225, 48, 108, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        /* Mobile optimizations */
        @media (max-width: 380px) {
            body {
                padding: 16px;
            }
            
            .btn {
                font-size: 16px;
                padding: 18px 20px;
                min-height: 56px;
            }
            
            .buttons {
                gap: 14px;
                margin-top: 40px;
            }
        }
        
        /* Larger screens */
        @media (min-width: 768px) {
            .container {
                max-width: 480px;
            }
            
            .btn {
                font-size: 20px;
                padding: 22px 28px;
                min-height: 68px;
            }
        }
        
        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .btn-primary {
                background: #000000;
            }
            
            .btn-secondary {
                background: #ffffff;
                border: 2px solid #000000;
                color: #000000;
            }
        }
        
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .btn {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <img src="./assets/images/SaigonGuac-removebg-preview.png" alt="Saigon Guac Logo" class="logo">
            <h1 class="brand-name">SAIGON GUACAMOLE</h1>
            <p class="tagline">FRESH • HANDMADE • AUTHENTIC</p>
            <p class="description">
                <strong>Guac that tastes like home</strong>
            </p>
        </div>
        
        <div class="buttons">
            <a href="./menu.html" class="btn btn-secondary">
                View Menu
            </a>
            
            <a href="http://wa.me/+84941035859" class="btn btn-primary">
                Order via WhatsApp
            </a>
            
            <a href="https://www.facebook.com/SaigonGuacamole" class="btn btn-tertiary">
                Facebook
            </a>
            
            <a href="https://www.instagram.com/saigonguacamole" class="btn btn-instagram">
                Instagram
            </a>
        </div>
    </div>
</body>
</html>
